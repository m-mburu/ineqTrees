url: https://m-mburu.github.io/ineqTrees/

template:
  bootstrap: 5
  light-switch: true
  theme: github-light
  theme-dark: github-dark
  includes:
    in_header: |
      <script>
      (function () {
        try {
          if (!localStorage.getItem("theme")) {
            localStorage.setItem("theme", "dark");
          }
        } catch (error) {}
      })();
      </script>

development:
  mode: release

home:
  title: ineqTrees
  description: Tree-based decomposition of health inequality.

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github, lightswitch]

articles:
  - title: Overview
    contents:
      - "inequality-aware-party-trees"
  - title: Tree internals
    contents:
      - "ci-ranking-helpers"
      - "ci-split-search"
      - "ci-tree-builder"
      - "ci-tree-models"
      - "model-selection"
      - "plots-for-party-trees"
  - title: Tidymodels
    contents:
      - "tidymodels-extension"
      - "tidmodels_ineqtrees"
      - "tidymodels-bridge"
  - title: Shapley decomposition
    contents:
      - "shapley-decomposition"
      - "shap_decomposition"
